services:
  helpdesk-service-api:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "5000:5000"
    environment:
      - AzureKeyVault__Uri=https://help-desk-service.vault.azure.net/
      - Cors__AllowedOrigins__0=http://localhost:5000
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ${HOME}/.azure:/root/.azure:ro
    restart: unless-stopped
